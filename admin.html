<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Painel · Yep Ads Brasil</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />

<style>
:root {
  --navy: #0F1B2D;
  --navy-deep: #0A1320;
  --navy-elev: #16243B;
  --navy-line: #1E3050;
  --orange: #FF6B1A;
  --orange-deep: #E55400;
  --orange-soft: rgba(255, 107, 26, 0.12);
  --cream: #FAF6F0;
  --cream-warm: #F4EDE2;
  --text: #E8EDF5;
  --text-dim: #8A98AE;
  --text-faint: #5A6A82;
  --green: #10B981;
  --red: #DC2626;
  --yellow: #F59E0B;
  --blue: #3B82F6;
  --font-display: 'Fraunces', 'Playfair Display', Georgia, serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}

@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--navy-deep);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ============ LOGIN ============ */
.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background:
    radial-gradient(ellipse at top right, rgba(255, 107, 26, 0.08), transparent 50%),
    radial-gradient(ellipse at bottom left, rgba(255, 107, 26, 0.05), transparent 50%),
    var(--navy-deep);
}
.login-card {
  width: 100%;
  max-width: 420px;
  background: var(--navy-elev);
  border: 1px solid var(--navy-line);
  border-radius: 18px;
  padding: 36px 32px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
}
.login-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}
.login-logo-mark {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 3px;
  width: 32px;
  height: 32px;
}
.login-logo-mark span {
  background: var(--orange);
  border-radius: 5px;
}
.login-logo-mark span:nth-child(2) { background: var(--cream); }
.login-logo-text {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.login-title {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}
.login-subtitle {
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 28px;
}
.login-field { margin-bottom: 16px; }
.login-field label {
  display: block;
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.login-field input {
  width: 100%;
  background: var(--navy-deep);
  border: 1px solid var(--navy-line);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.login-field input:focus {
  outline: none;
  border-color: var(--orange);
  box-shadow: 0 0 0 3px rgba(255, 107, 26, 0.15);
}
.login-btn {
  width: 100%;
  background: var(--orange);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.15s;
}
.login-btn:hover { background: var(--orange-deep); }
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.login-error {
  background: rgba(220, 38, 38, 0.1);
  border: 1px solid rgba(220, 38, 38, 0.25);
  color: #FCA5A5;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
}

/* ============ DASHBOARD ============ */
.dash { display: none; min-height: 100vh; }
.dash.active { display: block; }

.topbar {
  background: var(--navy);
  border-bottom: 1px solid var(--navy-line);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
  backdrop-filter: blur(8px);
}
.topbar-left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.topbar-logo {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 2px;
  width: 24px;
  height: 24px;
}
.topbar-logo span {
  background: var(--orange);
  border-radius: 4px;
}
.topbar-logo span:nth-child(2) { background: var(--cream); }
.topbar-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
}
.topbar-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--orange);
  background: var(--orange-soft);
  padding: 4px 9px;
  border-radius: 999px;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.btn-secondary {
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--navy-line);
  padding: 8px 14px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-secondary:hover {
  color: var(--text);
  border-color: var(--text-faint);
}

/* Stats */
.stats {
  padding: 24px 28px 8px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
}
.stat-card {
  background: var(--navy-elev);
  border: 1px solid var(--navy-line);
  border-radius: 12px;
  padding: 18px 20px;
}
.stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.stat-value {
  font-family: var(--font-display);
  font-size: 30px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.stat-value-orange { color: var(--orange); }
.stat-value-green { color: var(--green); }

/* Filtros */
.filters {
  padding: 18px 28px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.filter-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}
.filter-label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-faint);
  padding-right: 4px;
  flex-shrink: 0;
}
.filter-group {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.filter-chip {
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--navy-line);
  padding: 7px 13px;
  border-radius: 999px;
  font-family: inherit;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-chip:hover {
  color: var(--text);
  border-color: var(--text-faint);
}
.filter-chip.active {
  background: var(--orange);
  color: white;
  border-color: var(--orange);
}
.filter-chip-tipo.active {
  background: var(--green);
  border-color: var(--green);
}
.filter-chip-docs.active {
  background: #8B5CF6;
  border-color: #8B5CF6;
}
.filter-search {
  flex: 1;
  min-width: 220px;
  background: var(--navy-elev);
  border: 1px solid var(--navy-line);
  border-radius: 8px;
  padding: 9px 14px;
  color: var(--text);
  font-family: inherit;
  font-size: 13.5px;
}
.filter-search:focus {
  outline: none;
  border-color: var(--orange);
}

/* Tabela */
.table-wrap {
  padding: 8px 28px 40px;
}
.table-empty {
  background: var(--navy-elev);
  border: 1px dashed var(--navy-line);
  border-radius: 14px;
  padding: 60px 20px;
  text-align: center;
  color: var(--text-dim);
}
.table-empty-icon {
  font-size: 38px;
  opacity: 0.4;
  margin-bottom: 12px;
}
.cards-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.cand-card {
  background: var(--navy-elev);
  border: 1px solid var(--navy-line);
  border-radius: 12px;
  padding: 16px 20px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: center;
  transition: border-color 0.15s, transform 0.15s;
  cursor: pointer;
}
.cand-card:hover {
  border-color: var(--text-faint);
  transform: translateY(-1px);
}
.cand-main { min-width: 0; }
.cand-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 5px;
  flex-wrap: wrap;
}
.cand-name {
  font-weight: 600;
  font-size: 15px;
  color: var(--text);
}
.cand-vaga-tag {
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--orange);
  background: var(--orange-soft);
  padding: 3px 9px;
  border-radius: 999px;
}
.cand-origem-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  background: rgba(138, 152, 174, 0.08);
  padding: 3px 9px;
  border-radius: 999px;
}

/* Tags de origem (Vagas / Cadastro completo) */
.origem-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 3px 9px;
  border-radius: 999px;
  font-weight: 500;
}
.origem-vagas {
  color: #93C5FD;
  background: rgba(59, 130, 246, 0.12);
}
.origem-cadastro {
  color: #6EE7B7;
  background: rgba(16, 185, 129, 0.14);
  border: 1px solid rgba(16, 185, 129, 0.25);
}
.origem-docs {
  color: #C4B5FD;
  background: rgba(139, 92, 246, 0.14);
  border: 1px solid rgba(139, 92, 246, 0.3);
}
.cand-card-ambos {
  border-color: rgba(16, 185, 129, 0.18);
}
.cand-card-ambos:hover {
  border-color: rgba(16, 185, 129, 0.4);
}
.cand-meta {
  display: flex;
  gap: 14px;
  color: var(--text-dim);
  font-size: 13px;
  flex-wrap: wrap;
}
.cand-meta span { display: inline-flex; align-items: center; gap: 5px; }
.cand-meta-when { color: var(--text-faint); margin-left: auto; }

.cand-side {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Botão de excluir nos cards */
.card-delete-btn {
  background: transparent;
  border: 1px solid var(--navy-line);
  color: var(--text-faint);
  width: 32px;
  height: 32px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.card-delete-btn:hover {
  color: #FCA5A5;
  border-color: rgba(220, 38, 38, 0.4);
  background: rgba(220, 38, 38, 0.08);
}

/* Botão de excluir no modal */
.modal-foot-left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.btn-delete {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: 1px solid rgba(220, 38, 38, 0.25);
  color: #FCA5A5;
  padding: 7px 12px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-delete:hover {
  background: rgba(220, 38, 38, 0.12);
  border-color: rgba(220, 38, 38, 0.5);
}
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 11px;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
}
.status-novo { background: rgba(59, 130, 246, 0.12); color: #93C5FD; }
.status-contatado { background: rgba(245, 158, 11, 0.12); color: #FCD34D; }
.status-em_processo { background: rgba(255, 107, 26, 0.14); color: var(--orange); }
.status-aprovado { background: rgba(16, 185, 129, 0.14); color: #6EE7B7; }
.status-rejeitado { background: rgba(220, 38, 38, 0.14); color: #FCA5A5; }

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: currentColor;
}

/* Modal de detalhes */
.modal-back {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10, 19, 32, 0.85);
  backdrop-filter: blur(6px);
  z-index: 100;
  padding: 40px 20px;
  overflow-y: auto;
  animation: fadeIn 0.2s ease;
}
.modal-back.active { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-detail {
  background: var(--navy-elev);
  max-width: 720px;
  margin: 0 auto;
  border-radius: 16px;
  border: 1px solid var(--navy-line);
  overflow: hidden;
  animation: slideIn 0.25s ease;
}
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-detail-head {
  padding: 22px 26px;
  border-bottom: 1px solid var(--navy-line);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
}
.modal-detail-name {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.modal-detail-vaga {
  color: var(--orange);
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.modal-close {
  background: transparent;
  border: 1px solid var(--navy-line);
  color: var(--text-dim);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { color: var(--text); border-color: var(--text-faint); }

.modal-detail-body { padding: 22px 26px; }
.detail-section { margin-bottom: 22px; }
.detail-section:last-child { margin-bottom: 0; }
.detail-section-title {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  margin-bottom: 10px;
}
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.detail-item-label {
  font-size: 12px;
  color: var(--text-faint);
  margin-bottom: 3px;
}
.detail-item-value {
  font-size: 14px;
  color: var(--text);
  word-break: break-word;
}
.detail-item-value a { color: var(--orange); text-decoration: none; }
.detail-item-value a:hover { text-decoration: underline; }

/* Timeline de inscrições */
.timeline {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.timeline-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 10px 14px;
  background: var(--navy-deep);
  border: 1px solid var(--navy-line);
  border-radius: 10px;
}
.timeline-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.timeline-vagas .timeline-icon {
  background: rgba(59, 130, 246, 0.15);
  color: #93C5FD;
}
.timeline-cadastro .timeline-icon {
  background: rgba(16, 185, 129, 0.15);
  color: #6EE7B7;
}
.timeline-content {
  flex: 1;
  min-width: 0;
}
.timeline-content > div:first-child {
  font-size: 13.5px;
  color: var(--text);
  margin-bottom: 2px;
}
.timeline-when {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-faint);
}

.detail-warning {
  margin-top: 12px;
  padding: 11px 14px;
  background: rgba(245, 158, 11, 0.08);
  border: 1px solid rgba(245, 158, 11, 0.2);
  border-radius: 10px;
  color: #FCD34D;
  font-size: 13px;
  line-height: 1.5;
}
.detail-warning code {
  background: rgba(245, 158, 11, 0.15);
  padding: 1px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 12px;
}

/* KYC · Documentos */
.kyc-empty {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 18px;
  background: rgba(138, 152, 174, 0.05);
  border: 1px dashed var(--navy-line);
  border-radius: 12px;
  color: var(--text-dim);
}
.kyc-empty > span:first-child {
  font-size: 28px;
  opacity: 0.6;
}
.kyc-empty strong { color: var(--text); display: block; margin-bottom: 4px; font-weight: 600; }
.kyc-empty p { font-size: 13px; line-height: 1.5; }
.kyc-empty code {
  background: var(--navy-deep);
  padding: 1px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--orange);
}

.kyc-meta {
  display: flex;
  gap: 14px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.kyc-meta-item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--green);
}
.kyc-meta-item.kyc-warning { color: var(--yellow); }

.kyc-files {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 14px;
}
.kyc-file {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 12px 14px;
  background: var(--navy-deep);
  border: 1px solid var(--navy-line);
  border-radius: 10px;
  transition: border-color 0.15s;
}
.kyc-file:hover {
  border-color: rgba(139, 92, 246, 0.4);
}
.kyc-file-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: rgba(139, 92, 246, 0.12);
  color: #C4B5FD;
  display: flex;
  align-items: center;
  justify-content: center;
}
.kyc-file-info { min-width: 0; }
.kyc-file-label {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
}
.kyc-file-path {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-faint);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.btn-kyc-view {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #8B5CF6;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.btn-kyc-view:hover { background: #7C3AED; }

.kyc-checks {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 12px 14px;
  background: var(--navy-deep);
  border-radius: 10px;
  border: 1px solid var(--navy-line);
  margin-bottom: 12px;
}
.kyc-check {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
}
.kyc-check.ok { color: #6EE7B7; }
.kyc-check.fail { color: #FCA5A5; }

.kyc-obs {
  padding: 12px 14px;
  background: var(--navy-deep);
  border-radius: 10px;
  border: 1px solid var(--navy-line);
}

/* Etapas do recrutamento */
.etapas-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.etapa-item {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 14px;
  align-items: flex-start;
  padding: 14px 16px;
  background: var(--navy-deep);

<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo">

<script>
let SENHA = sessionStorage.getItem('yep_admin_senha') || '';
let DADOS = { candidaturas: [], completos: [] };
let FILTRO_STATUS = 'todos';
let FILTRO_TIPO = 'todos';
let FILTRO_BUSCA = '';
let CURRENT_DETAIL = null;

// ========= LOGIN =========
async function handleLogin(e) {
  e.preventDefault();
  const senha = document.getElementById('senha').value;
  const btn = document.getElementById('login-btn');
  const errBox = document.getElementById('login-error');
  errBox.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Entrando...';

  try {
    const res = await fetch('/api/admin-list', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ senha })
    });

    if (res.status === 401) {
      errBox.textContent = 'Senha incorreta';
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }

    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || 'Erro de conexão');
    }

    const data = await res.json();
    SENHA = senha;
    sessionStorage.setItem('yep_admin_senha', senha);
    DADOS = data;
    showDash();
    renderAll();
  } catch (err) {
    errBox.textContent = 'Erro: ' + err.message;
    errBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

function showDash() {
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('dash').classList.add('active');
}

function logout() {
  sessionStorage.removeItem('yep_admin_senha');
  SENHA = '';
  location.reload();
}

// ========= LOAD =========
async function loadData() {
  if (!SENHA) return;
  const container = document.getElementById('cards-container');
  container.innerHTML = '<div class="loader"></div>';
  try {
    const res = await fetch('/api/admin-list', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ senha: SENHA })
    });
    if (res.status === 401) { logout(); return; }
    if (!res.ok) throw new Error('Erro ao carregar');
    DADOS = await res.json();
    renderAll();
  } catch (err) {
    container.innerHTML = `<div class="table-empty"><p>Erro: ${err.message}</p></div>`;
  }
}

// ========= RENDER =========
// Normaliza WhatsApp (só dígitos) pra comparação
function normalizeWhats(w) {
  if (!w) return '';
  const digits = String(w).replace(/\D/g, '');
  // Tira o 55 inicial se tiver, e leading zeros, pra match mais flexível
  return digits.replace(/^55/, '').replace(/^0+/, '');
}

function normalizeEmail(e) {
  return (e || '').toLowerCase().trim();
}

// Junta candidaturas + cadastros_completos, agrupando por pessoa (email ou whatsapp).
// Cada item retornado representa UMA pessoa, com info se preencheu /vagas, /cadastro ou ambos.
function todosCandidatos() {
  const grupos = new Map();
  // Chave de grupo: tenta achar uma já existente que case com email ou whatsapp
  function findOrCreateGroup(c) {
    const email = normalizeEmail(c.email || c.candidato_email);
    const whats = normalizeWhats(c.whatsapp || c.whats || c.candidato_whatsapp);
    // Procura grupo existente
    for (const [key, g] of grupos) {
      if (email && g.emails.has(email)) return g;
      if (whats && g.whats.has(whats)) return g;
    }
    // Cria novo
    const novaKey = `g_${grupos.size}`;
    const g = {
      _key: novaKey,
      emails: new Set(),
      whats: new Set(),
      candidaturas: [],
      completos: [],
      documentos: []
    };
    grupos.set(novaKey, g);
    if (email) g.emails.add(email);
    if (whats) g.whats.add(whats);
    return g;
  }

  // Agrupa
  for (const c of DADOS.candidaturas) {
    const g = findOrCreateGroup(c);
    g.candidaturas.push(c);
    const email = normalizeEmail(c.email);
    const whats = normalizeWhats(c.whatsapp || c.whats);
    if (email) g.emails.add(email);
    if (whats) g.whats.add(whats);
  }
  for (const c of DADOS.completos) {
    const g = findOrCreateGroup(c);
    g.completos.push(c);
    const email = normalizeEmail(c.email);
    const whats = normalizeWhats(c.whatsapp || c.whats);
    if (email) g.emails.add(email);
    if (whats) g.whats.add(whats);
  }
  // Anexa documentos ao grupo correto (match por email ou whatsapp)
  if (DADOS.documentos) {
    for (const d of DADOS.documentos) {
      const g = findOrCreateGroup(d);
      g.documentos.push(d);
      const email = normalizeEmail(d.candidato_email);
      const whats = normalizeWhats(d.candidato_whatsapp);
      if (email) g.emails.add(email);
      if (whats) g.whats.add(whats);
    }
  }

  // Converte cada grupo numa entry da lista
  const resultado = [];
  for (const g of grupos.values()) {
    // Pega a inscrição mais recente como "principal" (pra mostrar dados/status)
    const todasInscricoes = [...g.candidaturas, ...g.completos];
    if (todasInscricoes.length === 0) continue;
    todasInscricoes.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    const principal = todasInscricoes[0];

    // Status: se tem em qualquer das duas, prioriza o mais avançado
    const statusOrder = { novo: 0, contatado: 1, em_processo: 2, aprovado: 3, rejeitado: 4 };
    let statusFinal = 'novo';
    let statusOrderMax = -1;
    todasInscricoes.forEach(i => {
      const s = i.status || 'novo';
      if ((statusOrder[s] || 0) >= statusOrderMax) {
        statusOrderMax = statusOrder[s] || 0;
        statusFinal = s;
      }
    });

    // Notas: junta de todas (se tiver)
    const notasFinal = todasInscricoes.map(i => i.notas).filter(Boolean).join(' | ');

    resultado.push({
      ...principal,
      _grupoKey: g._key,
      _candidaturas: g.candidaturas,
      _completos: g.completos,
      _documentos: g.documentos || [],
      _temVagas: g.candidaturas.length > 0,
      _temCadastro: g.completos.length > 0,
      _temDocs: (g.documentos || []).length > 0,
      _ambos: g.candidaturas.length > 0 && g.completos.length > 0,
      // Sobrescreve status com o "mais avançado" do grupo
      status: statusFinal,
      notas: notasFinal,
      // Mantém info da origem do registro principal (pra abrir o detalhe certo)
      _origem: g.completos.includes(principal) ? 'cadastros_completos' : 'candidaturas'
    });
  }

  return resultado.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
}

function renderAll() {
  renderStats();
  renderCards();
}

function renderStats() {
  const todos = todosCandidatos();
  const novos = todos.filter(c => (c.status || 'novo') === 'novo').length;
  const processo = todos.filter(c => c.status === 'em_processo' || c.status === 'contatado').length;
  const aprovados = todos.filter(c => c.status === 'aprovado').length;
  const completos = todos.filter(c => c._ambos).length;
  document.getElementById('stat-total').textContent = todos.length;
  document.getElementById('stat-novos').textContent = novos;
  document.getElementById('stat-processo').textContent = processo;
  document.getElementById('stat-aprovados').textContent = aprovados;
  // Stat extra: candidatos com cadastro completo
  const elCompletos = document.getElementById('stat-completos');
  if (elCompletos) elCompletos.textContent = completos;
}

function renderCards() {
  const container = document.getElementById('cards-container');
  let lista = todosCandidatos();

  if (FILTRO_STATUS !== 'todos') {
    lista = lista.filter(c => (c.status || 'novo') === FILTRO_STATUS);
  }

  if (FILTRO_TIPO === 'so_vagas') {
    lista = lista.filter(c => c._temVagas && !c._temCadastro);
  } else if (FILTRO_TIPO === 'so_cadastro') {
    lista = lista.filter(c => c._temCadastro && !c._temVagas);
  } else if (FILTRO_TIPO === 'completos') {
    lista = lista.filter(c => c._ambos);
  } else if (FILTRO_TIPO === 'com_docs') {
    lista = lista.filter(c => c._temDocs);
  }

  if (FILTRO_BUSCA) {
    const q = FILTRO_BUSCA.toLowerCase();
    lista = lista.filter(c =>
      (c.nome || '').toLowerCase().includes(q) ||
      (c.email || '').toLowerCase().includes(q) ||
      (c.vaga || '').toLowerCase().includes(q) ||
      (c.whatsapp || c.whats || '').toLowerCase().includes(q)
    );
  }

  if (lista.length === 0) {
    container.innerHTML = `
      <div class="table-empty">
        <div class="table-empty-icon">📭</div>
        <p>Nenhum candidato encontrado.</p>
        <p style="margin-top:6px; font-size:13px;">Quando alguém preencher o formulário, aparecerá aqui.</p>
      </div>`;
    return;
  }

  container.innerHTML = `<div class="cards-list">${lista.map(cardHTML).join('')}</div>`;
}

function cardHTML(c) {
  const status = c.status || 'novo';
  const statusLabel = labelStatus(status);
  const created = formatDate(c.created_at);

  // Tags de origem (uma pessoa pode ter as duas)
  const tagsOrigem = [];
  if (c._temVagas) {

function labelStatus(s) {
  const map = {
    novo: 'Novo',
    contatado: 'Contatado',
    em_processo: 'Em processo',
    aprovado: 'Aprovado',
    rejeitado: 'Rejeitado'
  };
  return map[s] || 'Novo';
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.floor(diffMs / 60000);
  const diffH = Math.floor(diffMin / 60);
  const diffD = Math.floor(diffH / 24);

  if (diffMin < 1) return 'agora';
  if (diffMin < 60) return `${diffMin}m atrás`;
  if (diffH < 24) return `${diffH}h atrás`;
  if (diffD < 7) return `${diffD}d atrás`;
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[<>&"']/g, ch => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[ch]));
}

function abrirDetalhe(origem, id) {
  // Encontra o grupo agrupado pelo id da inscrição
  const todos = todosCandidatos();
  const item = todos.find(t => {
    const allInscricoes = [...(t._candidaturas || []), ...(t._completos || [])];
    return allInscricoes.some(i => String(i.id) === String(id));
  });
  if (!item) {
    console.warn('Candidato não encontrado:', origem, id);
    return;
  }
  CURRENT_DETAIL = { ...item };
  renderDetalhe();
  document.getElementById('modal-back').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function fecharDetalhe() {
  document.getElementById('modal-back').classList.remove('active');
  document.body.style.overflow = '';
  CURRENT_DETAIL = null;
}

  if (e.target.id === 'modal-back') fecharDetalhe();

function formatValue(label, val) {
  if (!val) return '—';
  if (label === 'Email') return `<a href="mailto:${escapeHtml(val)}">${escapeHtml(val)}</a>`;
  if (label === 'WhatsApp') {
    const clean = String(val).replace(/\D/g, '');
    const wa = clean.length >= 10 ? (clean.startsWith('55') ? clean : '55' + clean) : '';
    return wa ? `<a href="https://wa.me/${wa}" target="_blank" rel="noopener">${escapeHtml(val)}</a>` : escapeHtml(val);
  }
  if (label.includes('Link') || label.includes('LinkedIn')) {
    const v = String(val);
    if (v.startsWith('http')) return `<a href="${escapeHtml(v)}" target="_blank" rel="noopener">${escapeHtml(v)}</a>`;
  }
  return escapeHtml(String(val));
}

function renderKYC(documentos) {
  // Pega o registro mais recente (caso a pessoa tenha enviado mais de 1 vez)
  const docs = [...documentos].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  const d = docs[0];
  const enviado = formatDate(d.created_at);

  const arquivos = [
    { label: 'RG ou CNH', path: d.rg_url, icon: 'id' },
    { label: 'Comprovante de residência', path: d.comprovante_residencia_url, icon: 'doc' }
  ].filter(a => a.path);

  // Compatibilidade com registros antigos que ainda têm cpf_cnh_url
  if (d.cpf_cnh_url) {
    arquivos.splice(1, 0, { label: 'CPF / CNH (legado)', path: d.cpf_cnh_url, icon: 'id' });
  }

  const checks = [
    { label: 'Confirmou que dados são verdadeiros', ok: !!d.dados_verdadeiros },
    { label: 'Autorizou consulta LGPD', ok: !!d.autorizacao_consulta }
  ];

  return `
    <div class="detail-section">
      <div class="detail-section-title">KYC · Documentos recebidos</div>
      <div class="kyc-meta">
        <div class="kyc-meta-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          Enviado ${enviado}
        </div>
        ${docs.length > 1 ? `<div class="kyc-meta-item kyc-warning">⚠️ ${docs.length} envios — mostrando o mais recente</div>` : ''}
      </div>

      <div class="kyc-files">
        ${arquivos.map(a => `
          <div class="kyc-file">
            <div class="kyc-file-icon">
              ${a.icon === 'id'
                ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>'
                : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'
              }
            </div>
            <div class="kyc-file-info">
              <div class="kyc-file-label">${a.label}</div>
              <div class="kyc-file-path">${escapeHtml(a.path.split('/').pop() || '')}</div>
            </div>
            <button class="btn-kyc-view" onclick="abrirDocumento('${escapeHtml(a.path)}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              Ver
            </button>
          </div>
        `).join('')}
      </div>

      <div class="kyc-checks">
        ${checks.map(ch => `
          <div class="kyc-check ${ch.ok ? 'ok' : 'fail'}">
            ${ch.ok
              ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
              : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
            }
            <span>${ch.label}</span>
          </div>
        `).join('')}
      </div>

      ${d.observacoes ? `
        <div class="kyc-obs">
          <div class="detail-item-label">Observações do candidato</div>
          <div class="detail-item-value" style="white-space: pre-wrap;">${escapeHtml(d.observacoes)}</div>
        </div>
      ` : ''}
    </div>
  `;
}

async function abrirDocumento(path) {
  try {
    const res = await fetch('/api/admin-doc-url', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': SENHA },
      body: JSON.stringify({ path })
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || 'Erro ao abrir documento');
    }
    const data = await res.json();
    window.open(data.url, '_blank', 'noopener');
  } catch (err) {
    alert('Erro ao abrir documento: ' + err.message);
  }
}

// Gera as 3 opções de horário padrão da Yep:
// Hoje (próximo dia útil): 15h, 20h | Amanhã (dia seguinte): 11h
// Sempre escolhe o próximo dia útil. Se hoje é sexta, "dia A" vira segunda e "dia B" vira terça.
function gerarHorariosPadrao() {
  const dias = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];

  // Função pra avançar pro próximo dia útil
  function proximoDiaUtil(dataBase) {
    let d = new Date(dataBase);
    do {
      d = new Date(d.getTime() + 24 * 3600 * 1000);
    } while (d.getDay() === 0 || d.getDay() === 6);
    return d;
  }

  function formatarDia(d) {
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    return `${dias[d.getDay()]} (${dd}/${mm})`;
  }

  // Dia A = próximo dia útil; Dia B = dia útil depois do A
  const diaA = proximoDiaUtil(new Date());
  const diaB = proximoDiaUtil(diaA);

  return [
    { id: 'opt1', label: `${formatarDia(diaA)} às 15h`, valor: `${formatarDia(diaA)} às 15h` },
    { id: 'opt2', label: `${formatarDia(diaA)} às 20h`, valor: `${formatarDia(diaA)} às 20h` },
    { id: 'opt3', label: `${formatarDia(diaB)} às 11h`, valor: `${formatarDia(diaB)} às 11h` }
  ];
}

function renderEtapas(c) {
  // Pega todas as inscrições da pessoa pra checar timestamps das etapas
  const todasInscricoes = [...(c._candidaturas || []), ...(c._completos || [])];
  // Pega os timestamps "max" entre todas inscrições da pessoa
  function getEtapaEm(num) {
    let max = null;
    for (const i of todasInscricoes) {
      const t = i[`etapa${num}_em`];
      if (t && (!max || new Date(t) > new Date(max))) max = t;
    }
    return max;
  }

  const temCadastro = c._temCadastro;

  // Lembrete de 40 min
  const etapa4Em = getEtapaEm(4);
  const etapa5Em = getEtapaEm(5);
  let lembreteHTML = '';
  if (etapa4Em && !etapa5Em) {
    const minPassados = (Date.now() - new Date(etapa4Em).getTime()) / 60000;
    if (minPassados >= 40) {
      lembreteHTML = `<div class="etapa-lembrete urgent">⏰ Já passaram ${Math.floor(minPassados)} min desde a confirmação da entrevista. <strong>Hora de mandar o link de documentos!</strong></div>`;
    } else {
      const restam = Math.ceil(40 - minPassados);
      lembreteHTML = `<div class="etapa-lembrete">⏱️ Mandar link de documentos em ${restam} min (40min após confirmação da entrevista)</div>`;
    }
  }

  return ETAPAS.map(et => {
    const etapaEm = getEtapaEm(et.num);
    const concluida = !!etapaEm;
    const bloqueada = et.requer === 'cadastro' && !temCadastro;

    return `
      <div class="etapa-item ${concluida ? 'concluida' : ''} ${bloqueada ? 'bloqueada' : ''}">
        <div class="etapa-check">
          ${concluida
            ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
            : `<span>${et.num}</span>`}
        </div>
        <div class="etapa-content">
          <div class="etapa-titulo">${et.titulo}</div>
          <div class="etapa-desc">${et.desc}</div>
          ${concluida ? `<div class="etapa-when">✓ Enviado ${formatDate(etapaEm)}</div>` : ''}
          ${bloqueada ? `<div class="etapa-locked">🔒 Aguardando candidato preencher /cadastro</div>` : ''}

          ${et.pedeHorarios && !concluida ? `
            <div class="etapa-horarios">
              <div class="hor-help">Marque os horários que vai oferecer (mín. 2):</div>
              ${gerarHorariosPadrao().map(h => `
                <label class="hor-check">
                  <input type="checkbox" class="hor-${et.num}" value="${h.valor}" checked />
                  <span>${h.label}</span>
                </label>
              `).join('')}
            </div>
          ` : ''}

          ${et.pedeQuem && !concluida ? `
            <div class="etapa-inputs">
              <input type="text" id="quem-${et.num}" placeholder="Nome do entrevistador (ex: Wallace)" value="${escapeHtml(c.entrevista_quem || 'Wallace')}" />
            </div>
          ` : ''}
        </div>
        <div class="etapa-actions">
          ${!bloqueada ? `
            <button class="btn-etapa-whats" onclick="enviarEtapa(${et.num})" ${concluida ? 'data-reenviar="1"' : ''}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884"/></svg>
              ${concluida ? 'Reenviar' : 'Enviar'}
            </button>
            ${concluida ? `<button class="btn-etapa-undo" onclick="desfazerEtapa(${et.num})" title="Desmarcar como enviada">↺</button>` : ''}
          ` : ''}
        </div>
      </div>
    `;
  }).join('') + lembreteHTML;
}

function enviarEtapa(numEtapa) {
  if (!CURRENT_DETAIL) return;
  const c = CURRENT_DETAIL;
  const etapa = ETAPAS.find(e => e.num === numEtapa);
  if (!etapa) return;

  // Coleta variáveis específicas da etapa
  let horariosSelecionados = [], quem = '';
  if (etapa.pedeHorarios) {
    document.querySelectorAll(`.hor-${numEtapa}:checked`).forEach(cb => {
      horariosSelecionados.push(cb.value);
    });
    if (horariosSelecionados.length < 2) {
      alert('Marque pelo menos 2 horários.');
      return;
    }
  }
  if (etapa.pedeQuem) {
    quem = (document.getElementById(`quem-${numEtapa}`)?.value || '').trim();
    if (!quem) {
      alert('Informe o nome do entrevistador.');
      return;
    }
  }

  // Gera mensagem
  const mensagem = etapa.template({
    nome: c.nome || '',
    vaga: c.vaga || '',
    horarios: horariosSelecionados, quem
  });

  // Monta link WhatsApp
  const whatsRaw = c.whatsapp || c.whats || '';
  const clean = String(whatsRaw).replace(/\D/g, '');
  const whatsFinal = clean.length >= 10
    ? (clean.startsWith('55') ? clean : '55' + clean)
    : '';
  if (!whatsFinal) {
    alert('Esse candidato não tem WhatsApp válido cadastrado.');
    return;
  }
  const link = `https://wa.me/${whatsFinal}?text=${encodeURIComponent(mensagem)}`;
  window.open(link, '_blank');

  // Marca como enviada (após 1.5s pra dar tempo do WhatsApp abrir)
  setTimeout(() => marcarEtapa(numEtapa, { horarios: horariosSelecionados, quem }), 1500);
}

async function marcarEtapa(numEtapa, dados = {}) {
  if (!CURRENT_DETAIL) return;
  const c = CURRENT_DETAIL;

  // Marca em TODAS as inscrições da pessoa (vagas + cadastro se tiver)
  const todasInscricoes = [...(c._candidaturas || []), ...(c._completos || [])];
  const updates = todasInscricoes.map(i => {
    const tabela = c._candidaturas.includes(i) ? 'candidaturas' : 'cadastros_completos';
    const body = { id: i.id, tabela, etapa: numEtapa };

    // Se tem horários e for etapa 3, salva
    if (numEtapa === 3 && dados.horarios && dados.horarios.length) {
      body.entrevista_horario = dados.horarios.join(' | ');
    }
    // Se for etapa 4, salva quem
    if (numEtapa === 4 && dados.quem) {
      body.entrevista_quem = dados.quem;
    }

    return fetch('/api/admin-etapa', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': SENHA },
      body: JSON.stringify(body)
    });
  });

  try {
    await Promise.all(updates);
    // Atualiza cache local
    const agora = new Date().toISOString();
    todasInscricoes.forEach(i => {
      i[`etapa${numEtapa}_em`] = agora;
      if (numEtapa === 3 && dados.horarios && dados.horarios.length) i.entrevista_horario = dados.horarios.join(' | ');
      if (numEtapa === 4 && dados.quem) i.entrevista_quem = dados.quem;
    });
    // Re-renderiza o detalhe
    CURRENT_DETAIL = todosCandidatos().find(t => {
      const ins = [...(t._candidaturas || []), ...(t._completos || [])];
      return ins.some(i => String(i.id) === String(c.id));
    }) || c;
    renderDetalhe();
    renderAll();
  } catch (err) {
    alert('Erro ao marcar etapa: ' + err.message);
  }
}

async function desfazerEtapa(numEtapa) {
  if (!CURRENT_DETAIL) return;
  if (!confirm(`Desmarcar a etapa ${numEtapa} como enviada?`)) return;
  const c = CURRENT_DETAIL;
  const todasInscricoes = [...(c._candidaturas || []), ...(c._completos || [])];

  const updates = todasInscricoes.map(i => {
    const tabela = c._candidaturas.includes(i) ? 'candidaturas' : 'cadastros_completos';
    return fetch('/api/admin-etapa', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': SENHA },
      body: JSON.stringify({ id: i.id, tabela, etapa: numEtapa, desfazer: true })
    });
  });

  try {
    await Promise.all(updates);
    todasInscricoes.forEach(i => { i[`etapa${numEtapa}_em`] = null; });
    CURRENT_DETAIL = todosCandidatos().find(t => {
      const ins = [...(t._candidaturas || []), ...(t._completos || [])];
      return ins.some(i => String(i.id) === String(c.id));
    }) || c;
    renderDetalhe();
    renderAll();
  } catch (err) {
    alert('Erro ao desfazer: ' + err.message);
  }
}

// ========= UPDATES =========
async function atualizarStatus(novoStatus) {
  if (!CURRENT_DETAIL) return;
  try {
    const res = await fetch('/api/admin-update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': SENHA },
      body: JSON.stringify({
        id: CURRENT_DETAIL.id,
        tabela: CURRENT_DETAIL._origem,
        status: novoStatus
      })
    });
    if (!res.ok) throw new Error('Falha ao atualizar');
    CURRENT_DETAIL.status = novoStatus;
    // Atualiza no cache local
    const lista = CURRENT_DETAIL._origem === 'cadastros_completos' ? DADOS.completos : DADOS.candidaturas;
    const idx = lista.findIndex(x => String(x.id) === String(CURRENT_DETAIL.id));
    if (idx >= 0) lista[idx].status = novoStatus;
    renderDetalhe();
    renderAll();
  } catch (err) {
    alert('Erro: ' + err.message);
  }
}

async function salvarNotas() {
  if (!CURRENT_DETAIL) return;
  const notas = document.getElementById('notes-textarea').value;
  try {
    const res = await fetch('/api/admin-update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': SENHA },
      body: JSON.stringify({
        id: CURRENT_DETAIL.id,
        tabela: CURRENT_DETAIL._origem,
        notas
      })
    });
    if (!res.ok) throw new Error('Falha ao salvar');
    CURRENT_DETAIL.notas = notas;
    const lista = CURRENT_DETAIL._origem === 'cadastros_completos' ? DADOS.completos : DADOS.candidaturas;
    const idx = lista.findIndex(x => String(x.id) === String(CURRENT_DETAIL.id));
    if (idx >= 0) lista[idx].notas = notas;
    const saved = document.getElementById('notes-saved');
    saved.classList.remove('show');
    void saved.offsetWidth;
    saved.classList.add('show');
  } catch (err) {
    alert('Erro: ' + err.message);
  }
}

// Excluir candidato (chamado pelo botão da lista ou do modal de detalhe)
async function excluirCandidato(origem, id) {
  try {
    const res = await fetch('/api/admin-delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': SENHA },
      body: JSON.stringify({ id, tabela: origem })
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || 'Falha ao excluir');
    }
    // Remove do cache local
    if (origem === 'cadastros_completos') {
      DADOS.completos = DADOS.completos.filter(x => String(x.id) !== String(id));
    } else {
      DADOS.candidaturas = DADOS.candidaturas.filter(x => String(x.id) !== String(id));
    }
    // Se o modal estava aberto pra esse candidato, fecha
    if (CURRENT_DETAIL && String(CURRENT_DETAIL.id) === String(id)) {
      fecharDetalhe();
    }
    renderAll();
  } catch (err) {
    alert('Erro ao excluir: ' + err.message);
  }
}

// Exclui TODAS as inscrições da pessoa (pode ter em ambas as tabelas)
async function excluirGrupoCompleto(item) {
  const promessas = [];
  if (item._candidaturas) {
    for (const i of item._candidaturas) {
      promessas.push(fetch('/api/admin-delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': SENHA },
        body: JSON.stringify({ id: i.id, tabela: 'candidaturas' })
      }));
    }
  }
  if (item._completos) {
    for (const i of item._completos) {
      promessas.push(fetch('/api/admin-delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': SENHA },
        body: JSON.stringify({ id: i.id, tabela: 'cadastros_completos' })
      }));
    }
  }
  try {
    const resultados = await Promise.all(promessas);
    const todasOk = resultados.every(r => r.ok);
    if (!todasOk) throw new Error('Algumas exclusões falharam');

    // Limpa do cache local
    const idsCand = (item._candidaturas || []).map(i => String(i.id));
    const idsComp = (item._completos || []).map(i => String(i.id));
    DADOS.candidaturas = DADOS.candidaturas.filter(x => !idsCand.includes(String(x.id)));
    DADOS.completos = DADOS.completos.filter(x => !idsComp.includes(String(x.id)));

    fecharDetalhe();
    renderAll();
  } catch (err) {
    alert('Erro ao excluir: ' + err.message);
  }
}

function confirmarExcluirAtual() {
  if (!CURRENT_DETAIL) return;
  const nome = CURRENT_DETAIL.nome || 'esse candidato';
  const totalInscricoes = (CURRENT_DETAIL._candidaturas?.length || 0) + (CURRENT_DETAIL._completos?.length || 0);
  const msg = totalInscricoes > 1
    ? `Excluir ${nome} permanentemente?\n\nIsso vai apagar TODAS as ${totalInscricoes} inscrições dessa pessoa (de /vagas e /cadastro). Não pode ser desfeito.`
    : `Excluir ${nome} permanentemente?\n\nEssa ação não pode ser desfeita.`;
  if (confirm(msg)) {
    excluirGrupoCompleto(CURRENT_DETAIL);
  }
}

// ========= EXPORT CSV =========
function exportCSV() {
  const lista = todosCandidatos();
  if (lista.length === 0) { alert('Nada pra exportar.'); return; }
  const headers = ['Tipo', 'Nome', 'Email', 'WhatsApp', 'Vaga', 'Link', 'Status', 'Cidade', 'Estado', 'Formação', 'Sobre', 'Notas', 'Data 1ª inscrição'];
  const rows = lista.map(c => {
    let tipo = 'Só /vagas';
    if (c._ambos) tipo = 'Vagas + Cadastro';
    else if (c._temCadastro) tipo = 'Só /cadastro';
    const cadastro = c._completos && c._completos[0];
    return [
      tipo,
      c.nome || '',
      c.email || '',
      c.whatsapp || c.whats || '',
      c.vaga || '',
      c.link || c.linkedin || c.portfolio || '',
      c.status || 'novo',
      (cadastro && cadastro.cidade) || '',
      (cadastro && cadastro.estado) || '',
      (cadastro && cadastro.formacao) || '',
      ((cadastro && cadastro.sobre) || '').replace(/\n/g, ' '),
      (c.notas || '').replace(/\n/g, ' '),
      c.created_at || ''
    ];
  });
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dt = new Date().toISOString().split('T')[0];
  a.href = url;
  a.download = `candidatos-yep-${dt}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
